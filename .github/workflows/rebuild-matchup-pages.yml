name: Rebuild matchup pages

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Date to rebuild in YYYY-MM-DD format"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: rebuild-matchup-pages
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate date
        shell: bash
        run: |
          DATE_INPUT="${{ github.event.inputs.date }}"
          if ! [[ "$DATE_INPUT" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "ERROR: date must use YYYY-MM-DD."
            exit 1
          fi
          test -f "data/member-brief/$DATE_INPUT.json" || {
            echo "ERROR: data/member-brief/$DATE_INPUT.json does not exist."
            exit 1
          }

      - name: Normalize Pitcher Matchup Tool source
        run: node scripts/normalize-pitcher-tool-source.js

      - name: Test shared pitcher source
        run: node tests/test-pitcher-matchup-core.js

      - name: Generate canonical Pitcher Matchup Tool data
        run: node scripts/generate-pitcher-matchup-data.js "${{ github.event.inputs.date }}"

      - name: Rebuild matchup pages
        run: node scripts/generate-matchup-pages.js "${{ github.event.inputs.date }}" --skip-weather

      - name: Verify pitcher data alignment
        run: node scripts/verify-pitcher-matchup-alignment.js "${{ github.event.inputs.date }}"

      - name: Verify output files
        shell: bash
        run: |
          DATE_INPUT="${{ github.event.inputs.date }}"
          test -f "data/pitcher-matchups/$DATE_INPUT.json"
          test -f "data/matchup-pages/$DATE_INPUT.json"
          test -f "mlb/matchups/index.html"
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('data/pitcher-matchups/$DATE_INPUT.json', 'utf8'));
            const m = JSON.parse(fs.readFileSync('data/matchup-pages/$DATE_INPUT.json', 'utf8'));
            if (!p.games || !Object.keys(p.games).length) throw new Error('No canonical pitcher games');
            if (!m.pages || !m.pages.length) throw new Error('No matchup pages');
            if (Object.keys(p.games).length !== m.pages.length) throw new Error('Pitcher and matchup page counts differ');
            console.log('Pitcher games:', Object.keys(p.games).length, 'Matchup pages:', m.pages.length);
          "

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          DATE_INPUT="${{ github.event.inputs.date }}"

          git config user.name "lydia-bot"
          git config user.email "actions@users.noreply.github.com"
          git add tools/pitcher-matchups/ data/pitcher-matchups/ data/matchup-pages/ mlb/ previews/ sitemap.xml

          if git diff --cached --quiet; then
            echo "No matchup changes to commit."
            exit 0
          fi

          git commit -m "Align matchup pages with pitcher tool $DATE_INPUT"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
