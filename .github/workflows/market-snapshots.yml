name: Market snapshots

on:
  schedule:
    # GitHub cron is UTC. This runs hourly through the normal MLB pregame window.
    # The script decides whether each game gets a current or closing snapshot.
    - cron: "0 15-23 * * *"
    - cron: "0 0-3 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "YYYY-MM-DD to update. Leave blank for today in America/New_York."
        required: false
        default: ""
      snapshot:
        description: "auto, current, or closing"
        required: false
        default: "auto"

permissions:
  contents: write

concurrency:
  group: market-snapshots
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve snapshot date
        id: snapshot_date
        run: |
          echo "UTC:"; date -u
          echo "Eastern:"; TZ="America/New_York" date
          DATE_INPUT="${{ github.event.inputs.date }}"
          if [ -z "$DATE_INPUT" ]; then
            DATE_INPUT=$(TZ="America/New_York" date +%F)
          fi
          echo "date=$DATE_INPUT" >> "$GITHUB_OUTPUT"
          echo "Resolved snapshot date: $DATE_INPUT"

      - name: Update market snapshot
        run: |
          SNAPSHOT_INPUT="${{ github.event.inputs.snapshot }}"
          node scripts/update-market-snapshot.js --date "${{ steps.snapshot_date.outputs.date }}" --snapshot "${SNAPSHOT_INPUT:-auto}"

      - name: Commit and push if changed
        run: |
          DATE_INPUT="${{ steps.snapshot_date.outputs.date }}"
          git config user.name "lydia-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/market/
          if git diff --cached --quiet; then
            echo "No market snapshot changes to commit."
          else
            git commit -m "Update market snapshots $DATE_INPUT"
            git pull --rebase
            git push
          fi
